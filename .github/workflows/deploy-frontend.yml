name: Deploy Frontend (Static Web App)

on:
  push:
    branches: [main]
    paths:
      - 'Azure Solution Portal/Frontend/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Azure Static Web Apps

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check SWA token configured
        id: check_token
        run: |
          if [ -z "$TOKEN" ]; then
            echo "⚠️  AZURE_STATIC_WEB_APPS_API_TOKEN non configurato."
            echo "   Crea la Static Web App da Azure Portal per impostare il secret automaticamente."
            echo "   Workflow saltato."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
        env:
          TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}

      - name: Deploy to Azure Static Web Apps
        if: steps.check_token.outputs.skip == 'false'
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: 'Azure Solution Portal/Frontend'
          # Nessuna build (file statici puri)
          skip_app_build: true
          output_location: ''
