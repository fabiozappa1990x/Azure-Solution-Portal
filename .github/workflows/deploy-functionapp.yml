name: Deploy Function App

on:
  push:
    branches: [main]
    paths:
      - 'Azure Solution Portal/FunctionApp/**'
      - 'Solution - Assessment 365/src/M365-Assess/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: windows-latest
    name: Deploy Azure Function App

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to Azure Functions (Premium)
        uses: Azure/functions-action@v1
        with:
          app-name: func-azsolportal-premium
          package: './Azure Solution Portal/FunctionApp'
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PREMIUM_PUBLISH_PROFILE }}
          scm-do-build-during-deployment: false
